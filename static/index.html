<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ava Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        surface: { DEFAULT: '#0f0f0f', secondary: '#161616', tertiary: '#1e1e1e', hover: '#262626' },
        accent: { DEFAULT: '#7c6df7', dim: '#6c5ce7', glow: 'rgba(124,109,247,0.12)' },
        border: '#222',
        tool: { bg: '#141822', border: '#1e2636' },
      },
      fontFamily: {
        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
        mono: ['JetBrains Mono', 'SF Mono', 'Fira Code', 'monospace'],
      },
      animation: { fadeIn: 'fadeIn 0.2s ease' },
      keyframes: { fadeIn: { from: { opacity: 0, transform: 'translateY(4px)' }, to: { opacity: 1, transform: 'translateY(0)' } } },
    }
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Base overrides that Tailwind CDN can't cover ── */
  * { box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

  /* Remove textarea resize handle and any browser artifacts */
  textarea { resize: none !important; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
  textarea::-webkit-resizer { display: none; }

  /* Chat text sizing — fixed at 14px */
  .msg-content { font-size: 14px; line-height: 1.65; }
  .msg-content pre { font-size: 13px; }
  .msg-content code { font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* Typing animation */
  .typing-dot { animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Tool block expand */
  .tool-body { display: none; }
  .tool-body.open { display: block; }
  .tool-arrow { transition: transform 0.2s; }
  .tool-arrow.open { transform: rotate(90deg); }

  /* Markdown content styles */
  .msg-content h1, .msg-content h2, .msg-content h3,
  .msg-content h4, .msg-content h5, .msg-content h6 {
    margin: 14px 0 6px; line-height: 1.3; font-weight: 600;
  }
  .msg-content h1 { font-size: 1.35em; }
  .msg-content h2 { font-size: 1.2em; }
  .msg-content h3 { font-size: 1.08em; }
  .msg-content ul, .msg-content ol { margin: 6px 0; padding-left: 22px; }
  .msg-content li { margin: 3px 0; }
  .msg-content blockquote {
    border-left: 3px solid #7c6df7; padding: 4px 14px; margin: 8px 0; color: #888;
  }
  .msg-content pre {
    background: #1a1a1a; border: 1px solid #262626; border-radius: 8px;
    padding: 14px; overflow-x: auto; margin: 10px 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .msg-content code {
    background: #1e1e1e; padding: 2px 6px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .msg-content pre code { background: none; padding: 0; }

  /* Transition for sidebar */
  @media (max-width: 768px) {
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
  }
</style>
</head>
<body class="bg-surface text-gray-200 h-dvh flex overflow-hidden font-sans">

<!-- Sidebar -->
<aside id="sidebar" class="w-72 bg-surface-secondary border-r border-border flex flex-col flex-shrink-0 transition-transform duration-200 ease-in-out z-50 fixed md:relative top-0 left-0 bottom-0">
  <!-- Logo + brand -->
  <div class="flex items-center gap-3 px-5 py-4 border-b border-border">
    <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-accent/20">A</div>
    <h1 class="text-base font-semibold text-gray-100 tracking-tight">Ava Agent</h1>
  </div>

  <!-- New chat button -->
  <div class="px-3 pt-3 pb-1">
    <button id="new-chat-btn" class="w-full py-2.5 px-4 bg-accent/10 hover:bg-accent/20 text-accent border border-accent/20 rounded-lg text-sm font-medium transition-all duration-150 active:scale-[0.98]">
      + New Chat
    </button>
  </div>

  <!-- Conversation list -->
  <div id="conversation-list" class="flex-1 overflow-y-auto px-2 py-2 space-y-0.5"></div>

  <!-- Footer -->
  <div class="px-3 py-3 border-t border-border">
    <button id="update-btn" title="Pull updates from GitHub and restart" class="w-full py-2.5 px-3 bg-surface-tertiary hover:bg-surface-hover text-gray-500 hover:text-gray-300 border border-border rounded-lg text-sm font-medium transition-all duration-150">
      Update Agent
    </button>
  </div>
</aside>

<!-- Overlay for mobile -->
<div id="overlay" class="hidden fixed inset-0 bg-black/50 z-40"></div>

<!-- Main -->
<main id="main" class="flex-1 flex flex-col min-w-0">
  <!-- Header -->
  <header id="chat-header" class="flex items-center gap-3 px-4 py-3 border-b border-border bg-surface-secondary/80 backdrop-blur-sm">
    <button id="menu-toggle" class="hidden md:hidden bg-transparent border-none text-gray-300 hover:text-white text-xl cursor-pointer p-1">&#9776;</button>
    <div id="chat-title" class="flex-1 text-sm font-medium text-gray-300 truncate">Ava Agent</div>
  </header>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-5 md:px-6">
    <div id="welcome" class="flex-1 flex flex-col items-center justify-center text-center gap-4 px-6">
      <div class="w-16 h-16 rounded-2xl bg-accent flex items-center justify-center text-white font-bold text-3xl shadow-xl shadow-accent/25">A</div>
      <h2 class="text-xl font-semibold text-gray-100">Ava Agent</h2>
      <p class="text-sm text-gray-500 max-w-sm leading-relaxed">Your AI assistant with full system access. Ask me to manage files, install packages, configure services, or anything else.</p>
    </div>
  </div>

  <!-- Input area -->
  <div id="input-area" class="px-4 py-4 border-t border-border bg-surface">
    <div id="input-wrapper" class="mx-auto flex gap-3 items-end">
      <textarea id="message-input" rows="1"
        placeholder="Message Ava..."
        autofocus
        class="flex-1 bg-surface-secondary border border-border rounded-xl px-4 py-3 text-gray-200 text-[14px] font-sans resize-none max-h-52 leading-relaxed outline-none focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition-all placeholder:text-gray-600"
      ></textarea>
      <button id="send-btn" title="Send"
        class="w-11 h-11 bg-accent hover:bg-accent-dim text-white rounded-xl flex items-center justify-center flex-shrink-0 transition-all duration-150 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed shadow-lg shadow-accent/20">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13"></path>
          <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
        </svg>
      </button>
    </div>
  </div>
</main>

<script>
(function() {
  // ── State ──────────────────────────────────────────
  let currentConvId = null;
  let isStreaming = false;
  let activeReader = null;
  let streamGeneration = 0;

  function abortStream() {
    if (activeReader) {
      activeReader.cancel();
      activeReader = null;
    }
    isStreaming = false;
    sendBtn.disabled = false;
  }

  // ── DOM refs ───────────────────────────────────────
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const menuToggle = document.getElementById('menu-toggle');
  const newChatBtn = document.getElementById('new-chat-btn');
  const convList = document.getElementById('conversation-list');
  const messagesEl = document.getElementById('messages');
  let welcomeEl = document.getElementById('welcome');
  const chatTitle = document.getElementById('chat-title');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const updateBtn = document.getElementById('update-btn');

  // ── Sidebar toggle (mobile) ────────────────────────
  menuToggle.onclick = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); };
  overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };

  // ── API helpers ────────────────────────────────────
  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    return res.json();
  }

  // ── Conversation list ──────────────────────────────
  async function loadConversations() {
    let convs;
    try {
      convs = await api('GET', '/api/conversations');
    } catch (e) {
      console.error('Failed to load conversations:', e);
      return;
    }
    convList.innerHTML = '';
    convs.forEach(c => {
      const el = document.createElement('div');
      const isActive = c.id === currentConvId;
      el.className = `group flex items-center gap-2 px-3 py-2.5 rounded-lg cursor-pointer text-[14px] transition-colors duration-100 ${isActive ? 'bg-surface-tertiary text-gray-200' : 'text-gray-500 hover:bg-surface-hover hover:text-gray-300'}`;
      el.innerHTML = `
        <span class="conv-title flex-1 truncate">${escapeHtml(c.title)}</span>
        <button class="conv-delete hidden group-hover:flex items-center justify-center w-5 h-5 rounded text-red-500/70 hover:text-red-400 hover:bg-red-500/10 text-sm leading-none transition-colors">&times;</button>
      `;
      el.querySelector('.conv-title').onclick = () => openConversation(c.id);
      el.querySelector('.conv-delete').onclick = async (e) => {
        e.stopPropagation();
        if (confirm('Delete this conversation?')) {
          await api('DELETE', `/api/conversations/${c.id}`);
          if (currentConvId === c.id) {
            currentConvId = null;
            showWelcome();
          }
          loadConversations();
        }
      };
      convList.appendChild(el);
    });
  }

  // ── Open a conversation ────────────────────────────
  async function openConversation(id) {
    abortStream();
    currentConvId = id;
    sidebar.classList.remove('open');
    overlay.classList.add('hidden');
    const conv = await api('GET', `/api/conversations/${id}`);
    chatTitle.textContent = conv.title;
    renderMessages(conv.messages);
    loadConversations();
    input.focus();
  }

  // ── Render messages ────────────────────────────────
  function renderMessages(messages) {
    messagesEl.innerHTML = '';
    let i = 0;
    while (i < messages.length) {
      const msg = messages[i];
      if (msg.role === 'user') {
        appendMessage('user', msg.content);
      } else if (msg.role === 'assistant') {
        if (msg.tool_calls && msg.tool_calls.length > 0) {
          msg.tool_calls.forEach(tc => {
            const args = tc.function.arguments;
            let argsObj;
            try { argsObj = typeof args === 'string' ? JSON.parse(args) : args; } catch { argsObj = { raw: args }; }
            const resultMsg = messages.find(m => m.role === 'tool' && m.tool_call_id === tc.id);
            const result = resultMsg ? resultMsg.content : '';
            appendToolBlock(tc.function.name, argsObj, result);
          });
        }
        if (msg.content) {
          appendMessage('assistant', msg.content);
        }
      }
      i++;
    }
    scrollToBottom();
  }

  function appendMessage(role, content) {
    welcomeEl?.remove();
    const el = document.createElement('div');

    if (role === 'user') {
      el.className = 'w-full mx-auto flex justify-end animate-fadeIn';
      el.innerHTML = `
        <div class="msg-content max-w-[80%] md:max-w-[70%] bg-indigo-600/90 text-gray-100 rounded-2xl rounded-br-md px-4 py-2.5">${escapeHtml(content)}</div>
      `;
    } else {
      el.className = 'w-full mx-auto flex gap-3 animate-fadeIn';
      el.innerHTML = `
        <div class="w-8 h-8 rounded-lg bg-accent text-white flex items-center justify-center text-xs font-semibold flex-shrink-0 shadow-md shadow-accent/15">A</div>
        <div class="msg-content max-w-[85%] md:max-w-[75%] min-w-0 bg-surface-tertiary text-gray-300 rounded-2xl rounded-bl-md px-4 py-2.5">${renderMarkdown(content)}</div>
      `;
    }

    messagesEl.appendChild(el);
    return el;
  }

  function appendToolBlock(name, args, result) {
    welcomeEl?.remove();
    const el = document.createElement('div');
    el.className = 'w-full mx-auto flex gap-3 animate-fadeIn';
    let commandStr = '';
    if (name === 'execute_command' && args.command) {
      commandStr = args.command;
    } else {
      commandStr = JSON.stringify(args, null, 2);
    }

    let resultDisplay = '';
    try {
      const parsed = JSON.parse(result);
      if (parsed.stdout || parsed.stderr) {
        resultDisplay = (parsed.stdout || '') + (parsed.stderr ? '\nSTDERR: ' + parsed.stderr : '');
        if (parsed.exit_code !== 0) resultDisplay += `\n[exit code: ${parsed.exit_code}]`;
      } else {
        resultDisplay = result;
      }
    } catch {
      resultDisplay = result;
    }

    el.innerHTML = `
      <div class="w-8 h-8 rounded-lg bg-accent text-white flex items-center justify-center text-xs font-semibold flex-shrink-0 shadow-md shadow-accent/15">A</div>
      <div class="max-w-[85%] md:max-w-[75%] min-w-0">
        <div class="bg-tool-bg border border-tool-border rounded-2xl rounded-bl-md overflow-hidden">
          <div class="tool-header flex items-center gap-2 px-3 py-2 text-xs font-semibold text-accent bg-accent/[0.06] cursor-pointer select-none" onclick="this.querySelector('.tool-arrow').classList.toggle('open'); this.nextElementSibling.classList.toggle('open');">
            <span class="tool-arrow text-[10px]">&#9654;</span>
            <span class="font-mono truncate">$ ${escapeHtml(commandStr.substring(0, 80))}${commandStr.length > 80 ? '...' : ''}</span>
          </div>
          <div class="tool-body px-3 py-2.5 text-xs font-mono max-h-72 overflow-y-auto whitespace-pre-wrap break-all text-gray-400">${escapeHtml(resultDisplay.trim() || '(no output)')}</div>
        </div>
      </div>
    `;
    messagesEl.appendChild(el);
  }

  // ── Send a message ─────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;

    if (!currentConvId) {
      try {
        const conv = await api('POST', '/api/conversations');
        currentConvId = conv.id;
        chatTitle.textContent = conv.title;
      } catch (err) {
        isStreaming = false;
        sendBtn.disabled = false;
        throw err;
      }
    }

    appendMessage('user', text);
    input.value = '';
    autoResize();
    scrollToBottom();

    const typingEl = appendMessage('assistant', '');
    typingEl.querySelector('.msg-content').innerHTML = '<div class="flex gap-1.5 py-1"><span class="typing-dot w-1.5 h-1.5 bg-gray-500 rounded-full"></span><span class="typing-dot w-1.5 h-1.5 bg-gray-500 rounded-full"></span><span class="typing-dot w-1.5 h-1.5 bg-gray-500 rounded-full"></span></div>';
    const myGeneration = ++streamGeneration;

    try {
      const response = await fetch(`/api/conversations/${currentConvId}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!response.ok) {
        typingEl.remove();
        appendMessage('assistant', `Request failed (${response.status}). Please try again.`);
        isStreaming = false;
        sendBtn.disabled = false;
        loadConversations();
        return;
      }

      const reader = response.body.getReader();
      activeReader = reader;
      const decoder = new TextDecoder();
      let buffer = '';
      let fullContent = '';
      let removedTyping = false;
      let rafPending = false;

      function processSSELine(line) {
        if (!line.startsWith('data: ')) return;
        let data;
        try { data = JSON.parse(line.slice(6)); } catch { return; }

        if (data.type === 'text') {
          if (!removedTyping) { typingEl.remove(); removedTyping = true; }
          fullContent += data.content;
          let streamMsg = messagesEl.querySelector('.streaming-msg');
          if (!streamMsg) {
            streamMsg = appendMessage('assistant', '');
            streamMsg.classList.add('streaming-msg');
          }
          if (!rafPending) {
            rafPending = true;
            requestAnimationFrame(() => {
              const el = messagesEl.querySelector('.streaming-msg');
              if (el) el.querySelector('.msg-content').innerHTML = renderMarkdown(fullContent);
              scrollToBottom();
              rafPending = false;
            });
          }
        }

        if (data.type === 'tool_call') {
          if (!removedTyping) { typingEl.remove(); removedTyping = true; }
          const existingStream = messagesEl.querySelector('.streaming-msg');
          if (existingStream) {
            existingStream.classList.remove('streaming-msg');
            fullContent = '';
          }
        }

        if (data.type === 'tool_result') {
          if (!removedTyping) { typingEl.remove(); removedTyping = true; }
          let args = {};
          try { args = JSON.parse(data.arguments || '{}'); } catch {}
          appendToolBlock(data.name || 'execute_command', args, data.result || '');
          scrollToBottom();
        }

        if (data.type === 'done') {
          const existingStream = messagesEl.querySelector('.streaming-msg');
          if (existingStream) existingStream.classList.remove('streaming-msg');
          if (!removedTyping) typingEl.remove();
        }

        if (data.type === 'error') {
          if (!removedTyping) { typingEl.remove(); removedTyping = true; }
          const existingStream = messagesEl.querySelector('.streaming-msg');
          if (existingStream) existingStream.classList.remove('streaming-msg');
          fullContent = '';
          appendMessage('assistant', data.content || 'An error occurred.');
        }
      }

      while (true) {
        if (myGeneration !== streamGeneration) break;
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          processSSELine(line);
        }
      }

      if (buffer.trim()) {
        const remaining = buffer.split('\n');
        for (const line of remaining) {
          processSSELine(line);
        }
      }
    } catch (err) {
      if (myGeneration !== streamGeneration) return;
      typingEl?.remove();
      const errEl = appendMessage('assistant', '');
      errEl.querySelector('.msg-content').textContent = `Connection error: ${err.message}`;
    }

    isStreaming = false;
    sendBtn.disabled = false;
    activeReader = null;
    loadConversations();
    scrollToBottom();
    input.focus();
  }

  // ── Welcome screen ─────────────────────────────────
  function showWelcome() {
    chatTitle.textContent = 'Ava Agent';
    messagesEl.innerHTML = `
      <div id="welcome" class="flex-1 flex flex-col items-center justify-center text-center gap-4 px-6">
        <div class="w-16 h-16 rounded-2xl bg-accent flex items-center justify-center text-white font-bold text-3xl shadow-xl shadow-accent/25">A</div>
        <h2 class="text-xl font-semibold text-gray-100">Ava Agent</h2>
        <p class="text-sm text-gray-500 max-w-sm leading-relaxed">Your AI assistant with full system access. Ask me to manage files, install packages, configure services, or anything else.</p>
      </div>
    `;
    welcomeEl = document.getElementById('welcome');
  }

  // ── Helpers ────────────────────────────────────────
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderMarkdown(text) {
    if (!text) return '';
    const codeBlocks = [];
    let raw = text;
    raw = raw.replace(/(^|\n)```(\w*)\n([\s\S]*?)\n```/g, (_, pre, lang, code) => {
      const idx = codeBlocks.length;
      codeBlocks.push(`<pre><code>${escapeHtml(code.trim())}</code></pre>`);
      return `${pre}\x00CODEBLOCK${idx}\x00`;
    });
    raw = raw.replace(/`([^`]+)`/g, (_, code) => {
      const idx = codeBlocks.length;
      codeBlocks.push(`<code>${escapeHtml(code)}</code>`);
      return `\x00CODEBLOCK${idx}\x00`;
    });
    let html = escapeHtml(raw);
    html = html.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    const lines = html.split('\n');
    const processed = [];
    let inList = null;
    let inBlockquote = false;
    let bqContent = [];
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const headerMatch = line.match(/^(#{1,6})\s+(.+)$/);
      if (headerMatch) {
        if (inBlockquote) { processed.push(`<blockquote>${bqContent.join('<br>')}</blockquote>`); bqContent = []; inBlockquote = false; }
        if (inList) { processed.push(`</${inList}>`); inList = null; }
        const level = headerMatch[1].length;
        processed.push(`<h${level}>${headerMatch[2]}</h${level}>`);
        continue;
      }
      const ulMatch = line.match(/^[\-\*]\s+(.+)$/);
      if (ulMatch) {
        if (inBlockquote) { processed.push(`<blockquote>${bqContent.join('<br>')}</blockquote>`); bqContent = []; inBlockquote = false; }
        if (inList !== 'ul') {
          if (inList) processed.push(`</${inList}>`);
          processed.push('<ul>');
          inList = 'ul';
        }
        processed.push(`<li>${ulMatch[1]}</li>`);
        continue;
      }
      const olMatch = line.match(/^\d+\.\s+(.+)$/);
      if (olMatch) {
        if (inBlockquote) { processed.push(`<blockquote>${bqContent.join('<br>')}</blockquote>`); bqContent = []; inBlockquote = false; }
        if (inList !== 'ol') {
          if (inList) processed.push(`</${inList}>`);
          processed.push('<ol>');
          inList = 'ol';
        }
        processed.push(`<li>${olMatch[1]}</li>`);
        continue;
      }
      const bqMatch = line.match(/^&gt;\s?(.*)$/);
      if (bqMatch) {
        if (inList) { processed.push(`</${inList}>`); inList = null; }
        inBlockquote = true;
        bqContent.push(bqMatch[1]);
        continue;
      }
      if (inBlockquote) { processed.push(`<blockquote>${bqContent.join('<br>')}</blockquote>`); bqContent = []; inBlockquote = false; }
      if (inList) { processed.push(`</${inList}>`); inList = null; }
      processed.push(line);
    }
    if (inBlockquote) processed.push(`<blockquote>${bqContent.join('<br>')}</blockquote>`);
    if (inList) processed.push(`</${inList}>`);
    html = processed.reduce((acc, line, i) => {
      if (i === 0) return line;
      const blockTags = /^<(h[1-6]|ul|ol|li|\/ul|\/ol|blockquote)/;
      if (blockTags.test(line) || blockTags.test(processed[i - 1])) return acc + line;
      return acc + '<br>' + line;
    }, '');
    html = html.replace(/\x00CODEBLOCK(\d+)\x00/g, (_, idx) => codeBlocks[parseInt(idx)]);
    return html;
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  }

  // ── Event listeners ────────────────────────────────
  newChatBtn.onclick = async () => {
    abortStream();
    currentConvId = null;
    showWelcome();
    loadConversations();
    sidebar.classList.remove('open');
    overlay.classList.add('hidden');
    input.focus();
  };

  sendBtn.onclick = sendMessage;

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', autoResize);

  updateBtn.onclick = async () => {
    if (!confirm('Pull updates from GitHub and restart the agent?')) return;
    updateBtn.textContent = 'Updating...';
    updateBtn.disabled = true;
    try {
      const res = await api('POST', '/api/update');
      alert(`Update status: ${res.message}\n\nGit output: ${res.git_output}`);
    } catch (err) {
      alert(`Update failed: ${err.message}`);
    }
    updateBtn.textContent = 'Update Agent';
    updateBtn.disabled = false;
  };

  // ── Mobile: show menu toggle ───────────────────────
  const mql = window.matchMedia('(max-width: 768px)');
  function handleMobile(e) { menuToggle.style.display = e.matches ? 'block' : 'none'; }
  handleMobile(mql);
  mql.addEventListener('change', handleMobile);

  // ── Init ───────────────────────────────────────────
  loadConversations();
})();
</script>
</body>
</html>
